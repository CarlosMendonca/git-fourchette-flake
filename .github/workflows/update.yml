name: Auto-update gitfourchette

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for new release
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh api repos/jorio/gitfourchette/releases/latest --jq '.tag_name')
          LATEST_SEMVER="${LATEST#v}"
          CURRENT=$(jq -r 'max_by(.version | split(".") | map(tonumber)) | .version' data/gitfourchette.json)
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "latest_semver=${LATEST_SEMVER}" >> "$GITHUB_OUTPUT"
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          if jq -e --arg v "$LATEST_SEMVER" 'any(.[]; .version == $v)' data/gitfourchette.json >/dev/null; then
            echo "Version ${LATEST_SEMVER} already in data/gitfourchette.json, nothing to do."
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          elif gh pr list --head "auto-update/gitfourchette-${LATEST_SEMVER}" --json number --jq 'length' | grep -q '^[1-9]'; then
            echo "Open PR already exists for ${LATEST}, nothing to do."
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "New version available: ${CURRENT} -> ${LATEST_SEMVER}"
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Nix
        if: steps.version.outputs.up_to_date == 'false'
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Append new release to data/gitfourchette.json
        if: steps.version.outputs.up_to_date == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix run path:.#update

      - name: Refresh flake.lock
        if: steps.version.outputs.up_to_date == 'false'
        run: nix flake update

      - name: Update README current version
        if: steps.version.outputs.up_to_date == 'false'
        run: |
          LATEST="${{ steps.version.outputs.latest }}"
          sed -i \
            -e "s|gitfourchette \[v[^]]*\](https://github.com/jorio/gitfourchette/releases/tag/v[^)]*)|gitfourchette [${LATEST}](https://github.com/jorio/gitfourchette/releases/tag/${LATEST})|" \
            README.md

      - name: Build and verify binary
        if: steps.version.outputs.up_to_date == 'false'
        run: |
          nix build path:.#gitfourchette
          if [ ! -x ./result/bin/gitfourchette ]; then
            echo "ERROR: ./result/bin/gitfourchette not found or not executable"
            exit 1
          fi
          echo "OK: ./result/bin/gitfourchette exists"

      - name: Open PR
        if: steps.version.outputs.up_to_date == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST="${{ steps.version.outputs.latest }}"
          LATEST_SEMVER="${{ steps.version.outputs.latest_semver }}"
          CURRENT="${{ steps.version.outputs.current }}"
          BRANCH="auto-update/gitfourchette-${LATEST_SEMVER}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/gitfourchette.json flake.lock README.md
          git commit -m "chore: add gitfourchette ${LATEST}"
          git push --force origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "chore: add gitfourchette ${LATEST}" \
            --body "Automated addition of gitfourchette \`${LATEST}\` (previous newest: \`v${CURRENT}\`).

          Changes:
          - \`data/gitfourchette.json\`: new entry with \`srcHash\`
          - \`README.md\`: current-version link updated to \`${LATEST}\`

          Installable as \`#gitfourchette_$(printf '%s' "$LATEST_SEMVER" | tr '.' '_')\`; \`gitfourchette\`/\`default\` now track it.

          Build verified (binary exists at \`result/bin/gitfourchette\`)." \
            --base main \
            --head "$BRANCH")

          gh pr merge --squash "$PR_URL"

          # Keep pushing git tags so legacy ?ref=vX.Y.Z pins remain available.
          git checkout main
          git pull
          git tag "$LATEST"
          git push origin "$LATEST"
